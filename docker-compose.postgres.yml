services:
  postgres:
    image: postgres:17-alpine
    container_name: web-coder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: web_coder
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d web_coder"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - web-coder-postgres-data:/var/lib/postgresql/data

volumes:
  web-coder-postgres-data:
